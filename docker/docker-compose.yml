# Docker Compose Configuration

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rms_network
      - proxy
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rms_network
      - proxy
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - rms_network
      - proxy
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq-dev.rule=Host(`rabbitmq.localhost`)"
      - "traefik.http.routers.rabbitmq-dev.entrypoints=web"
      - "traefik.http.routers.rabbitmq-dev.tls=true"
      - "traefik.http.services.rabbitmq-dev.loadbalancer.server.port=15672"
      - "traefik.docker.network=proxy"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - rms_network
      - proxy
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    restart: always
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: kibana
      SERVER_PUBLICBASEURL: http://kibana.localhost
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: change-this-32-char-key-for-dev-1
      XPACK_REPORTING_ENCRYPTIONKEY: change-this-32-char-key-for-dev-2
      XPACK_SECURITY_ENCRYPTIONKEY: change-this-32-char-key-for-dev-3
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - rms_network
      - proxy

networks:
  rms_network:
    driver: bridge
  proxy:
    external: true
